<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pla — The Building</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh;overflow-x:hidden}

.header{background:linear-gradient(135deg,#0f0f2a 0%,#1a1a3e 100%);border-bottom:1px solid rgba(108,92,231,.3);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.5px}
.header h1 span{background:linear-gradient(135deg,#6C5CE7,#00CEC9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:#888;font-size:.85rem;margin-top:2px}
.user-badge{display:flex;align-items:center;gap:10px;padding:8px 16px;background:rgba(108,92,231,.15);border:1px solid rgba(108,92,231,.3);border-radius:10px;font-size:.85rem;color:#c4b5fd}

.floor-nav{display:flex;gap:8px;padding:16px 32px;background:rgba(15,15,35,.8);border-bottom:1px solid rgba(255,255,255,.05);overflow-x:auto}
.floor-btn{padding:10px 20px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.03);color:#aaa;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.floor-btn:hover{border-color:rgba(108,92,231,.5);color:#fff}
.floor-btn.active{background:linear-gradient(135deg,#6C5CE7,#5a4bd1);border-color:#6C5CE7;color:#fff;box-shadow:0 4px 20px rgba(108,92,231,.4)}

.building{padding:24px 32px;max-width:1400px;margin:0 auto}
.floor-title{font-size:1.3rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.floor-title .num{background:linear-gradient(135deg,#6C5CE7,#00CEC9);color:#fff;padding:4px 12px;border-radius:8px;font-size:.85rem}

.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:32px}

.room{background:linear-gradient(145deg,rgba(20,20,45,.9),rgba(15,15,35,.95));border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.room:hover{border-color:rgba(108,92,231,.4);transform:translateY(-2px);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.room::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--agent-color),transparent);opacity:0;transition:opacity .3s}
.room:hover::before{opacity:1}

.room-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.room-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0}
.room-name{font-size:1rem;font-weight:700}
.room-label{font-size:.75rem;color:#666;margin-top:1px}

.agent-status{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-size:.82rem;color:#ccc}

.activity-log{max-height:80px;overflow-y:auto}
.activity-log div{font-size:.72rem;color:#555;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.activity-log div:last-child{border:none}

.detail-panel{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.detail-panel.open{display:flex}
.detail-card{background:linear-gradient(145deg,#14142d,#0f0f28);border:1px solid rgba(108,92,231,.3);border-radius:20px;padding:32px;max-width:500px;width:90%;position:relative}
.detail-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.05);border:none;color:#888;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:rgba(255,255,255,.1);color:#fff}
.detail-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:16px}
.detail-name{font-size:1.5rem;font-weight:800;margin-bottom:4px}
.detail-role{color:#888;font-size:.9rem;margin-bottom:16px}
.detail-status{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:12px;margin-bottom:16px}
.detail-log{background:rgba(255,255,255,.02);border-radius:12px;padding:16px}
.detail-log h4{font-size:.8rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.detail-log div{font-size:.82rem;color:#aaa;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.detail-log div:last-child{border:none}

.stats-bar{display:flex;gap:12px;padding:16px 32px;background:rgba(15,15,35,.6);border-top:1px solid rgba(255,255,255,.05);position:sticky;bottom:0}
.stat{flex:1;text-align:center;padding:12px;background:rgba(255,255,255,.02);border-radius:10px}
.stat .val{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#6C5CE7,#00CEC9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{font-size:.7rem;color:#666;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

@media(max-width:768px){
  .header{padding:16px}
  .floor-nav{padding:12px 16px}
  .building{padding:16px}
  .rooms-grid{grid-template-columns:1fr}
  .stats-bar{padding:12px 16px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>My Pla</span> Building</h1>
    <div class="sub">Your AI agency headquarters</div>
  </div>
  <div class="user-badge">👤 Asjid — Founder</div>
</div>

<div class="floor-nav" id="floorNav"></div>

<div class="building" id="building"></div>

<div class="stats-bar" id="statsBar"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-card" id="detailCard"></div>
</div>

<script>
const FLOORS = [
  { name: "Websites", icon: "🌐", rooms: [
    { id:"scout", name:"Scout's Den", agent:{ name:"Scout", role:"Lead Prospector", color:"#f39c12", icon:"S", status:"Scanning for leads...", log:["Found 3 new businesses","Analyzing website quality...","Lead scored 85/100","Qualified: Marketing Agency","Added to pipeline"] }},
    { id:"echo", name:"Echo's Office", agent:{ name:"Echo", role:"Outreach Specialist", color:"#6C5CE7", icon:"E", status:"Warming lead...", log:["Tone set: Professional","Drafting personalized opener...","Lead replied positively!","Moving to discovery call","Follow-up scheduled"] }},
    { id:"vector", name:"Vector's Room", agent:{ name:"Vector", role:"Client Acquisition", color:"#00CEC9", icon:"V", status:"Reviewing proposal", log:["Deal value: $4,200","Objection handled","Contract sent to client","Payment received!","New deal closed"] }},
    { id:"builder", name:"Builder's Workshop", agent:{ name:"Builder", role:"Web Developer", color:"#e17055", icon:"B", status:"Building site...", log:["Brand guidelines done","Three.js scene complete","Deployed to GitHub","Performance score: 98","Client review passed"] }},
    { id:"sentinel", name:"Sentinel's Station", agent:{ name:"Sentinel", role:"QA Reviewer", color:"#00b894", icon:"Q", status:"Reviewing code", log:["HTML score: 98/100","Accessibility: 92/100","Performance: 95/100","APPROVED ✓","Deployed to production"] }},
  ]},
  { name: "Apps & SaaS", icon: "📱", rooms: [
    { id:"freemium", name:"Freemium Lab", agent:{ name:"Freemium AI", role:"Tool Builder", color:"#a29bfe", icon:"F", status:"Building SEO Tool", log:["MVP completed","Core logic coded","Landing page 80%","Beta testers invited","Feedback collected"] }},
    { id:"saas", name:"SaaS Room", agent:{ name:"SaaS AI", role:"Product Builder", color:"#74b9ff", icon:"S", status:"Invoice Generator", log:["Stripe integration done","Auth flow complete","Beta is live","First paying user!","Feature request logged"] }},
    { id:"webapps", name:"WebApps Studio", agent:{ name:"WebApp AI", role:"Full-Stack Dev", color:"#55efc4", icon:"W", status:"CRM Dashboard", log:["React scaffold ready","API endpoints defined","Database schema done","UI components built","Testing in progress"] }},
    { id:"marketplace", name:"Marketplace Room", agent:{ name:"Marketplace AI", role:"Platform Builder", color:"#ffeaa7", icon:"M", status:"Design Store", log:["Onboarding flow done","Payment split working","Search filter live","First seller onboarded","10 listings created"] }},
  ]},
  { name: "Content", icon: "✍️", rooms: [
    { id:"content", name:"Content Factory", agent:{ name:"Content AI", role:"Content Creator", color:"#fd79a8", icon:"C", status:"Writing posts", log:["SEO research done","Draft 1 of 5 complete","Adding visuals...","Optimizing headlines","Scheduler set"] }},
    { id:"packages", name:"Package Room", agent:{ name:"Package AI", role:"Productizer", color:"#e84393", icon:"P", status:"Starter Pack", log:["4 posts/month package","Pricing: $800/mo","Templates ready","Onboarding docs done","Sales page live"] }},
    { id:"retainer", name:"Retainer Office", agent:{ name:"Retainer AI", role:"Account Manager", color:"#fab1a0", icon:"R", status:"3 clients active", log:["Client A: 12 posts done","Client B: 2 reels created","Client C: On track","Monthly report sent","Renewal confirmed"] }},
  ]},
  { name: "Marketing", icon: "📣", rooms: [
    { id:"command", name:"Marketing Command", agent:{ name:"Command AI", role:"Strategist", color:"#d63031", icon:"C", status:"200+ accounts", log:["IG: 45 accounts active","TW: 80 posting daily","LI: 30 engaging","Strategy updated","Campaign launched"] }},
    { id:"accounts", name:"Account Farm", agent:{ name:"Farm AI", role:"Operator", color:"#e17055", icon:"A", status:"50 IG accounts", log:["Batch creation done","Engagement rate: 4.2%","No flags detected","Content scheduled","Growth: +12% this week"] }},
    { id:"growth", name:"Growth Engine", agent:{ name:"Growth AI", role:"Growth Hacker", color:"#00cec9", icon:"G", status:"Funnel #7", log:["A/B test running","Variant B: +23%","Rolling out winner","Cost per lead: $2.10","ROI: 340%"] }},
  ]},
];

let currentFloor = 0;

function renderNav() {
  const nav = document.getElementById('floorNav');
  nav.innerHTML = FLOORS.map((f, i) => 
    `<button class="floor-btn ${i === currentFloor ? 'active' : ''}" onclick="selectFloor(${i})">
      ${f.icon} Floor ${i + 1} — ${f.name}
    </button>`
  ).join('');
}

function renderBuilding() {
  const el = document.getElementById('building');
  const floor = FLOORS[currentFloor];
  
  el.innerHTML = `
    <div class="floor-title">
      <span class="num">${currentFloor + 1}</span>
      ${floor.icon} ${floor.name}
    </div>
    <div class="rooms-grid">
      ${floor.rooms.map(r => `
        <div class="room" style="--agent-color:${r.agent.color}" onclick="openDetail('${r.id}')">
          <div class="room-header">
            <div class="room-icon" style="background:${r.agent.color}20;color:${r.agent.color}">${r.agent.icon}</div>
            <div>
              <div class="room-name">${r.name}</div>
              <div class="room-label">${r.agent.role}</div>
            </div>
          </div>
          <div class="agent-status">
            <div class="status-dot"></div>
            <div class="status-text">${r.agent.status}</div>
          </div>
          <div class="activity-log">
            ${r.agent.log.slice(-3).map(l => `<div>• ${l}</div>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  
  renderStats();
}

function renderStats() {
  let totalAgents = 0, activeAgents = 0;
  FLOORS.forEach(f => {
    f.rooms.forEach(r => {
      totalAgents++;
      activeAgents++;
    });
  });
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="val">${FLOORS.length}</div><div class="lbl">Floors</div></div>
    <div class="stat"><div class="val">${totalAgents}</div><div class="lbl">Agents</div></div>
    <div class="stat"><div class="val">${activeAgents}</div><div class="lbl">Active</div></div>
    <div class="stat"><div class="val">24/7</div><div class="lbl">Running</div></div>
  `;
}

function selectFloor(i) {
  currentFloor = i;
  renderNav();
  renderBuilding();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function openDetail(roomId) {
  let room;
  FLOORS.forEach(f => f.rooms.forEach(r => { if (r.id === roomId) room = r; }));
  if (!room) return;
  
  const a = room.agent;
  document.getElementById('detailCard').innerHTML = `
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-icon" style="background:${a.color}20;color:${a.color}">${a.icon}</div>
    <div class="detail-name">${a.name}</div>
    <div class="detail-role">${a.role} — ${room.name}</div>
    <div class="detail-status">
      <div class="status-dot"></div>
      <div>${a.status}</div>
    </div>
    <div class="detail-log">
      <h4>Activity Log</h4>
      ${a.log.map(l => `<div>• ${l}</div>`).join('')}
    </div>
  `;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

document.getElementById('detailPanel').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// Simulate live activity
function simulateActivity() {
  FLOORS.forEach(f => {
    f.rooms.forEach(r => {
      const activities = [
        "Processing request...", "Analyzing data...", "Generating output...",
        "Optimizing workflow...", "Running checks...", "Syncing state...",
        "Idle — ready for tasks", "Monitoring metrics...", "Updating models..."
      ];
      const randomActivity = activities[Math.floor(Math.random() * activities.length)];
      if (Math.random() > 0.7) {
        r.agent.status = randomActivity;
      }
    });
  });
  renderBuilding();
}

// Init
renderNav();
renderBuilding();
setInterval(simulateActivity, 8000);
</script>
</body>
</html>
