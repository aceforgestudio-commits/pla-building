<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pla — The Building</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;width:100vw;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block}
#blocker{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center}
#blocker.hidden{display:none}
#blocker h1{font-size:3rem;font-weight:800;margin-bottom:4px}
#blocker h1 span{color:#6C5CE7}
#blocker .sub{color:#888;font-size:1.05rem;margin-bottom:32px}
#blocker .btn{padding:16px 50px;background:linear-gradient(135deg,#6C5CE7,#00CEC9);border:none;border-radius:12px;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s}
#blocker .btn:hover{transform:scale(1.04);box-shadow:0 8px 30px rgba(108,92,231,.5)}
#blocker .info{margin-top:32px;color:#555;font-size:.82rem;text-align:center;line-height:2.2}
#blocker kbd{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:2px 8px;color:#aaa;font-family:inherit}
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(5,5,20,.85);border-bottom:1px solid rgba(255,255,255,.06);pointer-events:none;opacity:0;transition:opacity .3s}
#hud.vis{opacity:1}
#hud .fl{font-weight:700;font-size:.9rem;color:#c4b5fd}
#hud .pos{font-size:.8rem;color:#666}
#panel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;display:none;width:440px;max-width:92vw;background:rgba(8,8,25,.97);border:1px solid rgba(108,92,231,.3);border-radius:16px;padding:20px 24px;box-shadow:0 16px 60px rgba(0,0,0,.8)}
#panel.vis{display:flex;gap:14px;align-items:flex-start}
#panel .av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;flex-shrink:0}
#panel .inf{flex:1;min-width:0}
#panel .nm{font-size:1.05rem;font-weight:700}
#panel .rl{font-size:.75rem;color:#888;margin-top:1px}
#panel .st{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;margin:8px 0;font-size:.82rem;color:#bbb}
#panel .dot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#panel .log{font-size:.72rem;color:#555;line-height:1.6;max-height:65px;overflow-y:auto}
#panel .log div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
#elev{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:100;display:none;padding:10px 24px;background:rgba(108,92,231,.9);border-radius:10px;font-size:.88rem;font-weight:600;pointer-events:none}
#elev.vis{display:block}
#hint{position:fixed;top:55%;left:50%;transform:translate(-50%,-50%);z-index:150;padding:10px 24px;background:rgba(108,92,231,.85);border-radius:10px;font-size:.88rem;font-weight:600;pointer-events:none;opacity:0;transition:opacity .3s}
#hint.vis{opacity:1}
#minimap{position:fixed;top:60px;right:16px;z-index:100;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(0,0,0,.7);pointer-events:none;opacity:0;transition:opacity .3s}
#minimap.vis{opacity:1}
</style>
</head>
<body>
<div id="blocker">
  <h1><span>My Pla</span> Building</h1>
  <div class="sub">Walk through your AI agency. Meet every agent.</div>
  <button class="btn" id="enterBtn">Enter the Building</button>
  <div class="info">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
    <kbd>E</kbd> Elevator &nbsp;
    <kbd>F</kbd> Minimap &nbsp;
    <kbd>Esc</kbd> Pause
  </div>
</div>
<div id="hud"><div><div class="fl" id="fl"></div></div><div class="pos" id="pos"></div></div>
<div id="panel"><div class="av" id="av"></div><div class="inf"><div class="nm" id="nm"></div><div class="rl" id="rl"></div><div class="st"><div class="dot"></div><span id="st"></span></div><div class="log" id="lg"></div></div></div>
<div id="elev">Press <kbd>E</kbd> to change floor</div>
<div id="hint"></div>
<canvas id="minimap" width="180" height="140"></canvas>

<script>
const C = document.createElement('canvas');
const X = C.getContext('2d');
document.body.prepend(C);
C.style.cssText = 'position:fixed;inset:0;z-index:1';

let W, H;
function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize();
addEventListener('resize', resize);

const TILE = 40;
const COLORS = {
  floor: '#12122a', wall: '#1e1e3a', wallTop: '#2a2a50',
  door: '#3a3a60', hallway: '#0e0e22', player: '#6C5CE7',
  elevator: '#f39c12', agentBg: '#1a1a35'
};

const FLOORS = [
  { name:'Floor 1 — Websites', color:'#6C5CE7', rooms:[
    {name:"Scout's Den",agent:{name:'Scout',role:'Lead Prospector',color:'#f39c12',icon:'S',status:'Scanning for leads...',log:['Found 3 new businesses','Analyzing website quality...','Lead scored 85/100']}},
    {name:"Echo's Office",agent:{name:'Echo',role:'Outreach Specialist',color:'#6C5CE7',icon:'E',status:'Warming lead...',log:['Tone: Professional','Crafting opener...','Lead replied!']}},
    {name:"Vector's Room",agent:{name:'Vector',role:'Client Acquisition',color:'#00CEC9',icon:'V',status:'Reviewing proposal',log:['Deal: $4,200','Objection handled','Contract sent']}},
    {name:"Builder's Workshop",agent:{name:'Builder',role:'Web Developer',color:'#e17055',icon:'B',status:'Building site...',log:['Brand generated','Three.js done','Deployed to GitHub']}},
    {name:"Sentinel's Station",agent:{name:'Sentinel',role:'QA Reviewer',color:'#00b894',icon:'Q',status:'Reviewing code',log:['HTML: 98/100','A11y: 92/100','APPROVED']}},
  ]},
  { name:'Floor 2 — Apps & SaaS', color:'#00CEC9', rooms:[
    {name:'Freemium Lab',agent:{name:'Freemium AI',role:'Tool Builder',color:'#a29bfe',icon:'F',status:'Building SEO Tool',log:['MVP done','Logic coded','Landing 80%']}},
    {name:'SaaS Room',agent:{name:'SaaS AI',role:'Product Builder',color:'#74b9ff',icon:'S',status:'Invoice Generator',log:['Stripe done','Auth flow done','Beta live']}},
    {name:'WebApps Studio',agent:{name:'WebApp AI',role:'Full-Stack Dev',color:'#55efc4',icon:'W',status:'CRM Dashboard',log:['React scaffold','API defined','DB schema done']}},
    {name:'Marketplace Room',agent:{name:'Marketplace AI',role:'Platform Builder',color:'#ffeaa7',icon:'M',status:'Design Store',log:['Onboarding flow','Payment split','Search filter']}},
  ]},
  { name:'Floor 3 — Content', color:'#fd79a8', rooms:[
    {name:'Content Factory',agent:{name:'Content AI',role:'Content Creator',color:'#fd79a8',icon:'C',status:'Writing posts',log:['SEO done','Draft 1/5','Adding visuals']}},
    {name:'Package Room',agent:{name:'Package AI',role:'Productizer',color:'#e84393',icon:'P',status:'Starter Pack',log:['4 posts/mo','Pricing: $800','Templates ready']}},
    {name:'Retainer Office',agent:{name:'Retainer AI',role:'Account Manager',color:'#fab1a0',icon:'R',status:'3 clients active',log:['A: 12 posts','B: 2 reels','On track']}},
  ]},
  { name:'Floor 4 — Marketing', color:'#d63031', rooms:[
    {name:'Marketing Command',agent:{name:'Command AI',role:'Strategist',color:'#d63031',icon:'C',status:'200+ accounts',log:['IG: 45 active','TW: 80 posting','LI: 30 engaging']}},
    {name:'Account Farm',agent:{name:'Farm AI',role:'Operator',color:'#e17055',icon:'A',status:'50 IG accounts',log:['Batch done','Engagement 4.2%','No flags']}},
    {name:'Growth Engine',agent:{name:'Growth AI',role:'Growth Hacker',color:'#00cec9',icon:'G',status:'Funnel #7',log:['A/B running','B +23%','Rolling out']}},
  ]},
];

// Map layout: 0=floor, 1=wall, 2=door, 3=elevator, 4=agent desk
// Each floor has: top wall, 5 rooms (3 top, hallway, 2 bottom), bottom wall
const MAP_W = 22, MAP_H = 16;

function buildMap(floorIdx) {
  const m = [];
  for (let y = 0; y < MAP_H; y++) {
    m[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      // Walls on edges
      if (y === 0 || y === MAP_H - 1 || x === 0 || x === MAP_W - 1) { m[y][x] = 1; continue; }
      // Hallway (row 7-8)
      if (y === 7 || y === 8) { m[y][x] = 0; continue; }
      // Vertical walls between rooms
      if ((x === 5 || x === 11 || x === 17) && y !== 7 && y !== 8) { m[y][x] = 1; continue; }
      // Floor
      m[y][x] = 0;
    }
  }
  // Doors (openings in walls)
  m[7][5] = 2; m[8][5] = 2;
  m[7][11] = 2; m[8][11] = 2;
  m[7][17] = 2; m[8][17] = 2;
  // Elevator at left end of hallway
  m[7][2] = 3; m[8][2] = 3; m[7][3] = 3; m[8][3] = 3;
  return m;
}

let map = buildMap(0);
let currentFloor = 0;

// Player
let player = { x: 10 * TILE + TILE / 2, y: 8 * TILE + TILE / 2, r: 10, speed: 2.5, sprint: false };
let keys = {};
let paused = false;
let gameStarted = false;
let showPanel = false;
let panelAgent = null;
let nearElevator = false;
let showMinimap = false;

// Agent positions (center of each room)
function getAgentPositions(fi) {
  const f = FLOORS[fi];
  const pos = [];
  // Top rooms: row 1-6, cols split into 3 zones
  const topZones = [{x1:1,x2:4},{x1:6,x2:10},{x1:12,x2:16}];
  // Bottom rooms: row 9-14
  const botZones = [{x1:1,x2:4},{x1:6,x2:10},{x1:12,x2:16},{x1:18,x2:20}];
  const topRooms = f.rooms.filter((_, i) => i < 3);
  const botRooms = f.rooms.filter((_, i) => i >= 3);
  
  topRooms.forEach((r, i) => {
    if (i < topZones.length) {
      const z = topZones[i];
      pos.push({ room: r, cx: ((z.x1 + z.x2) / 2) * TILE, cy: 3.5 * TILE, zone: z });
    }
  });
  botRooms.forEach((r, i) => {
    const z = botZones[i] || botZones[botZones.length - 1];
    pos.push({ room: r, cx: ((z.x1 + z.x2) / 2) * TILE, cy: 11 * TILE, zone: z });
  });
  return pos;
}

let agentPositions = getAgentPositions(0);

// Input
addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'shift') player.sprint = true;
  if (e.key.toLowerCase() === 'e' && nearElevator) {
    currentFloor = (currentFloor + 1) % FLOORS.length;
    map = buildMap(currentFloor);
    agentPositions = getAgentPositions(currentFloor);
    player.x = 3 * TILE; player.y = 7.5 * TILE;
    showHint('Now on ' + FLOORS[currentFloor].name);
  }
  if (e.key.toLowerCase() === 'f') { showMinimap = !showMinimap; document.getElementById('minimap').classList.toggle('vis', showMinimap); }
  if (e.key === 'Escape') { paused = !paused; }
});
addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key.toLowerCase() === 'shift') player.sprint = false;
});

let hintTimer = null;
function showHint(text) {
  const el = document.getElementById('hint');
  el.textContent = text;
  el.classList.add('vis');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => el.classList.remove('vis'), 2000);
}

// Collision
function isWalkable(px, py) {
  const tileX = Math.floor(px / TILE);
  const tileY = Math.floor(py / TILE);
  if (tileX < 0 || tileX >= MAP_W || tileY < 0 || tileY >= MAP_H) return false;
  return map[tileY][tileX] !== 1;
}

function canMove(nx, ny) {
  const r = player.r * 0.7;
  return isWalkable(nx - r, ny - r) && isWalkable(nx + r, ny - r) && isWalkable(nx - r, ny + r) && isWalkable(nx + r, ny + r);
}

// Camera
let camX = 0, camY = 0;

function update() {
  if (!gameStarted || paused) return;
  const spd = player.sprint ? player.speed * 1.7 : player.speed;
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= spd;
  if (keys['s'] || keys['arrowdown']) dy += spd;
  if (keys['a'] || keys['arrowleft']) dx -= spd;
  if (keys['d'] || keys['arrowright']) dx += spd;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  if (dx !== 0 && canMove(player.x + dx, player.y)) player.x += dx;
  if (dy !== 0 && canMove(player.x, player.y + dy)) player.y += dy;
  
  // Camera smooth follow
  camX += (player.x - W / 2 - camX) * 0.08;
  camY += (player.y - H / 2 - camY) * 0.08;
  
  // Check elevator proximity
  const eTileX = Math.floor(player.x / TILE), eTileY = Math.floor(player.y / TILE);
  nearElevator = (eTileX >= 2 && eTileX <= 3 && eTileY >= 7 && eTileY <= 8);
  document.getElementById('elev').classList.toggle('vis', nearElevator);
  
  // Check agent proximity
  let nearest = null, minDist = 80;
  agentPositions.forEach(ap => {
    const d = Math.hypot(player.x - ap.cx, player.y - ap.cy);
    if (d < minDist) { minDist = d; nearest = ap; }
  });
  
  if (nearest && !nearElevator) {
    if (!showPanel || panelAgent !== nearest.room) {
      panelAgent = nearest.room;
      showPanel = true;
      const a = nearest.room.agent;
      document.getElementById('av').textContent = a.icon;
      document.getElementById('av').style.cssText = `background:${a.color}20;color:${a.color}`;
      document.getElementById('nm').textContent = a.name;
      document.getElementById('rl').textContent = a.role + ' — ' + nearest.room.name;
      document.getElementById('st').textContent = a.status;
      document.getElementById('lg').innerHTML = a.log.map(l => '<div>• ' + l + '</div>').join('');
      document.getElementById('panel').classList.add('vis');
    }
  } else {
    if (showPanel) { showPanel = false; document.getElementById('panel').classList.remove('vis'); }
  }
}

function draw() {
  X.fillStyle = '#060610';
  X.fillRect(0, 0, W, H);
  if (!gameStarted) return;
  
  X.save();
  X.translate(-camX, -camY);
  
  // Draw map
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const px = x * TILE, py = y * TILE;
      const t = map[y][x];
      if (t === 1) {
        // Wall
        X.fillStyle = COLORS.wall;
        X.fillRect(px, py, TILE, TILE);
        X.fillStyle = COLORS.wallTop;
        X.fillRect(px, py, TILE, 4);
      } else if (t === 2) {
        // Door
        X.fillStyle = COLORS.floor;
        X.fillRect(px, py, TILE, TILE);
        X.fillStyle = COLORS.door;
        X.fillRect(px + 8, py, TILE - 16, TILE);
      } else if (t === 3) {
        // Elevator
        X.fillStyle = COLORS.floor;
        X.fillRect(px, py, TILE, TILE);
        X.fillStyle = '#f39c1230';
        X.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
        X.strokeStyle = '#f39c12';
        X.lineWidth = 1;
        X.strokeRect(px + 2, py + 2, TILE - 4, TILE - 4);
      } else {
        // Floor
        X.fillStyle = (y === 7 || y === 8) ? COLORS.hallway : COLORS.floor;
        X.fillRect(px, py, TILE, TILE);
        // Grid lines
        X.strokeStyle = 'rgba(255,255,255,0.02)';
        X.strokeRect(px, py, TILE, TILE);
      }
    }
  }
  
  // Draw room labels
  const floor = FLOORS[currentFloor];
  X.font = 'bold 11px Segoe UI, sans-serif';
  X.textAlign = 'center';
  X.textBaseline = 'top';
  
  const labelPositions = [
    {x:2.5*TILE, y:1*TILE}, {x:8*TILE, y:1*TILE}, {x:14*TILE, y:1*TILE},
    {x:2.5*TILE, y:9.5*TILE}, {x:8*TILE, y:9.5*TILE}, {x:14*TILE, y:9.5*TILE}
  ];
  floor.rooms.forEach((r, i) => {
    if (i >= labelPositions.length) return;
    const lp = labelPositions[i];
    X.fillStyle = 'rgba(255,255,255,0.15)';
    X.fillText(r.name, lp.x, lp.y);
  });
  
  // Hallway label
  X.fillStyle = 'rgba(255,255,255,0.08)';
  X.fillText('— HALLWAY —', 10 * TILE, 7.2 * TILE);
  
  // Elevator label
  X.fillStyle = '#f39c12';
  X.font = 'bold 10px Segoe UI, sans-serif';
  X.fillText('ELEVATOR', 2.5 * TILE, 7.2 * TILE);
  
  // Draw agents
  agentPositions.forEach(ap => {
    const a = ap.room.agent;
    // Desk
    X.fillStyle = '#1a1a35';
    X.fillRect(ap.cx - 16, ap.cy - 10, 32, 20);
    X.strokeStyle = a.color + '40';
    X.lineWidth = 1;
    X.strokeRect(ap.cx - 16, ap.cy - 10, 32, 20);
    // Agent circle
    X.beginPath();
    X.arc(ap.cx, ap.cy - 18, 10, 0, Math.PI * 2);
    X.fillStyle = a.color + '30';
    X.fill();
    X.strokeStyle = a.color;
    X.lineWidth = 1.5;
    X.stroke();
    // Icon
    X.fillStyle = a.color;
    X.font = 'bold 10px Segoe UI, sans-serif';
    X.textAlign = 'center';
    X.textBaseline = 'middle';
    X.fillText(a.icon, ap.cx, ap.cy - 18);
    // Status glow
    X.beginPath();
    X.arc(ap.cx + 14, ap.cy - 22, 3, 0, Math.PI * 2);
    X.fillStyle = '#10b981';
    X.fill();
  });
  
  // Draw player
  // Body shadow
  X.beginPath();
  X.arc(player.x + 2, player.y + 2, player.r, 0, Math.PI * 2);
  X.fillStyle = 'rgba(0,0,0,0.3)';
  X.fill();
  // Body
  X.beginPath();
  X.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  X.fillStyle = COLORS.player;
  X.fill();
  X.strokeStyle = '#8b7cf0';
  X.lineWidth = 2;
  X.stroke();
  // Inner highlight
  X.beginPath();
  X.arc(player.x - 2, player.y - 2, 3, 0, Math.PI * 2);
  X.fillStyle = 'rgba(255,255,255,0.3)';
  X.fill();
  // Label
  X.fillStyle = '#fff';
  X.font = 'bold 9px Segoe UI, sans-serif';
  X.textAlign = 'center';
  X.textBaseline = 'bottom';
  X.fillText('ASJID', player.x, player.y - player.r - 4);
  
  // Interaction prompt
  let nearest = null, minDist = 80;
  agentPositions.forEach(ap => {
    const d = Math.hypot(player.x - ap.cx, player.y - ap.cy);
    if (d < minDist) { minDist = d; nearest = ap; }
  });
  if (nearest && !nearElevator) {
    X.fillStyle = 'rgba(108,92,231,0.8)';
    X.font = '10px Segoe UI, sans-serif';
    X.textBaseline = 'top';
    X.fillText(nearest.room.agent.name, nearest.cx, nearest.cy + 16);
  }
  
  X.restore();
  
  // HUD
  document.getElementById('fl').textContent = FLOORS[currentFloor].name;
  document.getElementById('pos').textContent = `${Math.floor(player.x / TILE)}, ${Math.floor(player.y / TILE)}`;
}

// Minimap
function drawMinimap() {
  if (!showMinimap) return;
  const mc = document.getElementById('minimap').getContext('2d');
  mc.fillStyle = '#0a0a1a';
  mc.fillRect(0, 0, 180, 140);
  const sx = 180 / MAP_W, sy = 140 / MAP_H;
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const t = map[y][x];
      if (t === 1) mc.fillStyle = '#2a2a50';
      else if (t === 2) mc.fillStyle = '#3a3a60';
      else if (t === 3) mc.fillStyle = '#f39c1240';
      else mc.fillStyle = '#0e0e22';
      mc.fillRect(x * sx, y * sy, sx + .5, sy + .5);
    }
  }
  // Player on minimap
  mc.fillStyle = '#6C5CE7';
  mc.beginPath();
  mc.arc(player.x / TILE * sx, player.y / TILE * sy, 3, 0, Math.PI * 2);
  mc.fill();
}

function loop() {
  update();
  draw();
  drawMinimap();
  requestAnimationFrame(loop);
}

document.getElementById('enterBtn').onclick = () => {
  document.getElementById('blocker').classList.add('hidden');
  document.getElementById('hud').classList.add('vis');
  gameStarted = true;
  showHint('WASD to move, E for elevator');
};

loop();
</script>
</body>
</html>
